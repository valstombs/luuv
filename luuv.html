<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AREA 51 LOVE MESSAGE</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    overflow:hidden;
    background:black;
    font-family:'Poppins',sans-serif;
    height:100vh;
}

/* ========================= */
/* ESPACIO */
/* ========================= */

.space{
    position:fixed;
    width:100%;
    height:100%;
    background:
    radial-gradient(circle at center,
    #0b1026 0%,
    #050816 40%,
    black 100%);
    overflow:hidden;
}

.star{
    position:absolute;
    background:white;
    border-radius:50%;
    animation:twinkle infinite alternate;
}

@keyframes twinkle{
    from{
        opacity:0.2;
    }

    to{
        opacity:1;
    }
}

/* ========================= */
/* NAVE */
/* ========================= */

.ufo-container{
    position:absolute;
    top:-300px;
    left:50%;
    transform:translateX(-50%);
    animation:ufoEntrance 5s ease forwards;
    z-index:10;
}

@keyframes ufoEntrance{

    0%{
        top:-300px;
        transform:translateX(-50%) scale(0.3);
    }

    70%{
        top:15%;
        transform:translateX(-50%) scale(1);
    }

    100%{
        top:12%;
        transform:translateX(-50%) scale(1);
    }
}

.ufo{
    width:320px;

    filter:
    drop-shadow(0 0 25px cyan)
    drop-shadow(0 0 70px #00fff7);

    animation:float 3s ease-in-out infinite;
}

@keyframes float{

    0%{
        transform:translateY(0px);
    }

    50%{
        transform:translateY(-12px);
    }

    100%{
        transform:translateY(0px);
    }
}

/* ========================= */
/* LUZ */
/* ========================= */

.beam{
    position:absolute;
    top:180px;
    left:50%;
    transform:translateX(-50%);
    width:0;
    height:0;

    border-left:160px solid transparent;
    border-right:160px solid transparent;
    border-top:450px solid rgba(0,255,255,0.15);

    filter:blur(5px);

    opacity:0;

    pointer-events:none;

    animation:beamAppear 2s ease forwards;
    animation-delay:4s;
}

@keyframes beamAppear{

    from{
        opacity:0;
    }

    to{
        opacity:1;
    }
}

/* ========================= */
/* PANEL */
/* ========================= */

.panel{

    position:absolute;

    bottom:-500px;

    left:50%;

    transform:translateX(-50%);

    width:90%;
    max-width:850px;

    background:rgba(10,15,35,0.55);

    border:1px solid rgba(0,255,255,0.25);

    border-radius:35px;

    padding:40px;

    backdrop-filter:blur(18px);

    text-align:center;

    opacity:0;

    animation:panelAppear 2s ease forwards;
    animation-delay:5s;

    box-shadow:
    0 0 25px rgba(0,255,255,0.2),
    0 0 80px rgba(123,47,255,0.25);
}

@keyframes panelAppear{

    from{
        bottom:-500px;
        opacity:0;
    }

    to{
        bottom:6%;
        opacity:1;
    }
}

.title{

    font-family:'Orbitron',sans-serif;

    font-size:3rem;

    color:#00fff7;

    letter-spacing:4px;

    text-shadow:
    0 0 10px #00fff7,
    0 0 25px #00fff7;
}

.subtitle{

    margin-top:15px;

    color:#cfd2ff;

    font-size:1rem;

    letter-spacing:2px;
}

/* ========================= */
/* BOTON */
/* ========================= */

.btn{

    margin-top:35px;

    border:none;

    padding:18px 40px;

    border-radius:60px;

    background:
    linear-gradient(45deg,#00fff7,#5b2dff);

    color:white;

    font-size:1rem;
    font-weight:700;

    letter-spacing:2px;

    cursor:pointer;

    transition:0.4s;

    box-shadow:
    0 0 20px rgba(0,255,255,0.5);
}

.btn:hover{

    transform:scale(1.08);

    box-shadow:
    0 0 50px rgba(0,255,255,0.8);
}

/* ========================= */
/* MENSAJE */
/* ========================= */

.message-box{

    display:none;

    margin-top:35px;

    animation:fadeIn 2s ease forwards;
}

.message{

    font-size:3rem;

    font-weight:700;

    line-height:1.3;

    color:white;

    text-shadow:
    0 0 20px rgba(255,255,255,0.4);
}

.message span{

    color:#00fff7;

    text-shadow:
    0 0 15px #00fff7,
    0 0 35px #00fff7;
}

/* ========================= */
/* FRASE */
/* ========================= */

.quote{

    margin-top:25px;

    font-size:1.3rem;

    line-height:1.7;

    color:white;

    font-style:italic;

    text-shadow:
    0 0 15px rgba(255,255,255,0.2);
}

.quote-author{

    margin-top:10px;

    color:#00fff7;

    font-weight:700;

    font-size:1.5rem;

    text-shadow:
    0 0 10px #00fff7;
}

/* ========================= */
/* VIDEO */
/* ========================= */

.video-container{

    margin-top:30px;

    border-radius:25px;

    overflow:hidden;

    border:2px solid rgba(0,255,255,0.3);

    box-shadow:
    0 0 25px rgba(0,255,255,0.3);
}

video{
    width:100%;
    display:block;
}

/* ========================= */
/* FOOTER */
/* ========================= */

.footer{

    margin-top:25px;

    color:#9ca3ff;

    letter-spacing:3px;

    font-size:0.9rem;
}

/* ========================= */
/* ANIMACIONES */
/* ========================= */

@keyframes fadeIn{

    from{
        opacity:0;
        transform:translateY(20px);
    }

    to{
        opacity:1;
        transform:translateY(0);
    }
}

/* ========================= */
/* RESPONSIVE */
/* ========================= */

@media(max-width:768px){

    .title{
        font-size:2rem;
    }

    .message{
        font-size:1.9rem;
    }

    .quote{
        font-size:1rem;
    }

    .ufo{
        width:220px;
    }
}

</style>
</head>

<body>

<div class="space" id="space"></div>

<!-- NAVE -->
<div class="ufo-container">

    <svg class="ufo" viewBox="0 0 512 512">

        <ellipse cx="256" cy="320" rx="180" ry="70"
        fill="#7b2fff"/>

        <ellipse cx="256" cy="250" rx="90" ry="55"
        fill="#00fff7"/>

        <ellipse cx="256" cy="320" rx="180" ry="70"
        stroke="#00fff7"
        stroke-width="10"/>

        <circle cx="200" cy="320" r="10" fill="white"/>
        <circle cx="256" cy="320" r="10" fill="white"/>
        <circle cx="312" cy="320" r="10" fill="white"/>

    </svg>

    <div class="beam"></div>

</div>

<!-- PANEL -->
<div class="panel">

    <div class="title">
        Llegaron los marsianos
    </div>

    <div class="subtitle">
        אני אוהב אותך ♥
    </div>

    <button class="btn"
    onclick="showMessage(); flyAway();">
        RECIBIR MENSAJE
    </button>

    <!-- MENSAJE -->
    <div class="message-box" id="messageBox">

        <div class="message">
            Te quiero mucho Payolo<br>
            <span> 👽 </span>
        </div>

        <!-- FRASE -->
        <div class="quote">
            “Si nada nos salva de la muerte,
            al menos que el amor nos salve de la vida.”
            - Pablo Neruda
        </div>

       

        

        <div class="footer">
           Como a una tortuguita chiquitita
        </div>

    </div>

</div>

<!-- AUDIO -->
<audio id="sound">

<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_4d6f1d5c5d.mp3?filename=futuristic-logo-13694.mp3">

</audio>

<script>

/* ========================= */
/* ESTRELLAS */
/* ========================= */

const space = document.getElementById('space');

for(let i=0;i<220;i++){

    const star = document.createElement('div');

    star.classList.add('star');

    let size = Math.random()*3;

    star.style.width = size + 'px';
    star.style.height = size + 'px';

    star.style.left = Math.random()*100 + '%';
    star.style.top = Math.random()*100 + '%';

    star.style.animationDuration =
    (Math.random()*3+1)+'s';

    space.appendChild(star);
}

/* ========================= */
/* MOSTRAR MENSAJE */
/* ========================= */

function showMessage(){

    document
    .getElementById('messageBox')
    .style.display='block';

    document
    .getElementById('sound')
    .play();
}

/* ========================= */
/* NAVE SE VA */
/* ========================= */

function flyAway(){

    document.querySelector('.ufo-container').style.transition =
    '3s ease-in-out';

    document.querySelector('.ufo-container').style.transform =
    'translateX(-50%) translateY(-900px) scale(0.2) rotate(20deg)';

    document.querySelector('.ufo-container').style.opacity =
    '0';
}

</script>

</body>
</html>
